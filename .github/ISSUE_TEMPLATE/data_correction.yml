name: "📊 Correction / Ajout de données"
description: "Signaler une donnée incorrecte ou proposer un ajout"
title: "[Data]: "
labels: ["data"]
body:
- type: checkboxes
  id: modification-type
  attributes:
  label: Type de modification
  options:
  - label: Correction de donnée existante
  - label: Ajout de nouvelle donnée
  - label: Donnée manquante
  validations:
  required: true
- type: checkboxes
  id: category
  attributes:
  label: Catégorie concernée
  options:
  - label: Armes
  - label: Équipements
  - label: Talents d'armes
  - label: Talents d'équipements
  - label: Ensembles (Gear Sets / Marques)
  - label: Compétences
  - label: Mods (armes / équipements / compétences)
  validations:
  required: true
- type: textarea
  id: description
  attributes:
  label: Description
  description: Décrivez précisément la correction ou l'ajout. Indiquez les valeurs actuelles et attendues.
  validations:
  required: true
- type: input
  id: files
  attributes:
  label: Fichier(s) JSONC concerné(s)
  placeholder: ex. src/data/armes.jsonc
- type: input
  id: source
  attributes:
  label: Source
  description: D'où vient l'information ? (ex. jeu en TU22, patch notes, etc.)
  validations:
  required: true
- type: textarea
  id: additional-info
  attributes:
  label: Informations supplémentaires
  description: Captures d'écran du jeu, liens vers les patch notes, etc.